# App name and profile (env: SPRING_PROFILES_ACTIVE).
spring.application.name=cognilogistic-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Local profile: seeded platform admin credentials.
app.local.platform-admin-phone=+919900000099
app.local.platform-admin-mpin=1234
app.local.platform-admin-display-name=Dev Platform Admin

# Server port, context path, and error response detail.
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

server.error.include-message=always
server.error.include-binding-errors=always

# MySQL datasource (use env or application-local.properties for secrets).
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cognilogisticv1}?useSSL=${DB_SSL:false}&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Kundansingh!@#321}

# Hikari pool limits and connection timeout (ms).
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA: validate schema only; Flyway owns DDL.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false

# Flyway migration classpath folders (platform first).
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.flyway.locations[0]=classpath:db/migration/platform
spring.flyway.locations[1]=classpath:db/migration/auth
spring.flyway.locations[2]=classpath:db/migration/user
spring.flyway.locations[3]=classpath:db/migration/order
spring.flyway.locations[4]=classpath:db/migration/integration
spring.flyway.locations[5]=classpath:db/migration/tender
spring.flyway.locations[6]=classpath:db/migration/notification
spring.flyway.locations[7]=classpath:db/migration/legal
spring.flyway.locations[8]=classpath:db/migration/seed

# Actuator endpoints and K8s health probes.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true

# JWT secret and token TTLs (set JWT_SECRET outside dev).
auth.jwt.secret=${JWT_SECRET:change-me-32-bytes-minimum-secret-for-uat-only-do-not-use-in-prod}

auth.jwt.web-access-ttl-minutes=15
auth.jwt.mobile-access-ttl-minutes=60
auth.jwt.refresh-ttl-days=30
auth.jwt.temp-token-ttl-minutes=5
auth.jwt.reset-token-ttl-minutes=10

# M-PIN brute-force lockout.
auth.pin.max-failed-attempts=5
auth.pin.lockout-minutes=30

# OTP format, lifetime, and resend cooldown (seconds).
auth.otp.length=6
auth.otp.ttl-minutes=10
auth.otp.resend-cooldown-seconds=60
auth.otp.max-verify-attempts=5
# Optional fixed OTP for local/test (unset in prod). Override via AUTH_OTP_FIXED_CODE.
auth.otp.fixed-code=${AUTH_OTP_FIXED_CODE:}

# OTP delivery: log = code logged on server (local/UAT/tests).
# twilio = Twilio Verify SMS (production). Use random codes when fixed-code is unset.
otp.delivery=${OTP_DELIVERY:log}
otp.log-codes-in-server-logs=${OTP_LOG_CODES_IN_SERVER_LOGS:true}

# Twilio Verify credentials (required when otp.delivery=twilio).
otp.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
otp.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
otp.twilio.verify-service-sid=${TWILIO_VERIFY_SERVICE_SID:}

# Vahan API (mock uses stub responses).
vahan.mock=${VAHAN_MOCK:true}
vahan.base-url=${VAHAN_BASE_URL:https://vahan.parivahan.gov.in/api}
vahan.api-key=${VAHAN_API_KEY:}

# Sarathi stub toggle.
sarathi.mock=${SARATHI_MOCK:true}

# BR-10 Vahan-consent gate on confirm-fleet (FTL).
# Safe-by-default: gate is ON. Local/test profiles relax it via their own override
# (application-local.properties / application-test.properties). Pilot and prod inherit
# this default; opt-out requires an explicit env var so a forgotten config can never
# silently disable BR-10.
orders.fleet.require-vahan-consent=${ORDERS_FLEET_REQUIRE_VAHAN_CONSENT:true}

# GST stub toggle.
gst.mock=${GST_MOCK:true}

# Outbound notifications: channels, locales, idempotency cache.
notifications.sms.mock=${SMS_MOCK:true}
notifications.sms.from=${TWILIO_FROM:+1XXXXXXXXXX}

notifications.whatsapp.mode=${WHATSAPP_MODE:TEMPLATE_ONLY}
notifications.whatsapp.bsp-url=${WA_BSP_URL:}
notifications.whatsapp.bsp-key=${WA_BSP_KEY:}

notifications.push.enabled=${PUSH_ENABLED:false}
notifications.push.nh-connection-string=${AZURE_NH_CONNECTION:}
notifications.push.nh-name=${AZURE_NH_NAME:cognilogistic-pilot}

notifications.templates.locale=${NOTIF_LOCALE:hi-IN}
notifications.templates.fallback-locale=en-US

notifications.idempotency.cache-ttl-minutes=60
notifications.idempotency.cache-max-entries=10000

# Logger levels for root, app, audit, and Hibernate SQL.
logging.level.root=INFO
logging.level.com.cognilogistic=DEBUG
logging.level.com.cognilogistic.auth.audit=INFO
logging.level.org.hibernate.SQL=WARN

# Springdoc OpenAPI and Swagger UI URL paths.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
