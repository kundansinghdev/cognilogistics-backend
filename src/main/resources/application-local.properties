# =============================================================================
# application-local.properties — overrides for the `local` developer profile.
#
# Loaded only when SPRING_PROFILES_ACTIVE=local (the default in application.properties).
# Pilot and prod must NOT inherit these values, so they live here rather than in the
# base file. Anything that loosens a security gate, disables a check, or assumes a
# mock integration belongs here.
# =============================================================================

# -----------------------------------------------------------------------------
# BR-10 Vahan-consent gate (FTL confirm-fleet).
#
# The Vahan and Sarathi consent persistence is paused until the real MoRTH
# integrations land (see VahanService.recordConsent / SarathiService.recordConsent
# TODO blocks). With persistence disabled, the strict gate would block every FTL
# confirm-fleet on developer machines. Relaxing only in `local` keeps the safe
# default (true) intact for every other profile.
# -----------------------------------------------------------------------------
orders.fleet.require-vahan-consent=${ORDERS_FLEET_REQUIRE_VAHAN_CONSENT:false}

# OTP: fixed code for manual testing; logged to the API console (no SMS).
auth.otp.fixed-code=791122
otp.delivery=log
otp.log-codes-in-server-logs=true
